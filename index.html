<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>과천 기사, 구역별 물량</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Malgun Gothic', dotum, sans-serif; }
        #map { width: 100%; height: 100%; z-index: 1; }
        
        /* 상단 제어 박스 */
        .map-control-box {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 280px;
            width: calc(100% - 30px);
        }
        .btn-row {
            display: flex;
            gap: 8px;
            background: rgba(255, 255, 255, 0.94);
            padding: 8px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.12);
            border: 1px solid rgba(0, 0, 0, 0.06);
        }
        .control-btn {
            flex: 1;
            border: 1px solid #e2e8f0;
            background: #ffffff;
            color: #4a5568;
            padding: 10px 8px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .control-btn:hover {
            background: #f7fafc;
            border-color: #cbd5e0;
        }
        .control-btn.active {
            background: #0055d4;
            color: #ffffff;
            border-color: #0055d4;
            box-shadow: 0 2px 6px rgba(0, 85, 212, 0.3);
        }

        /* 세로형 통합 현황판 */
        .calc-result-vertical {
            background: rgba(28, 28, 35, 0.96) !important;
            color: #ffffff !important;
            padding: 16px 20px !important;
            border-radius: 12px !important;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3) !important;
            display: none; 
            flex-direction: column;
            gap: 10px;
            letter-spacing: -0.5px;
            box-sizing: border-box;
            max-height: 70vh;
            overflow-y: auto;
        }
        .calc-result-vertical .calc-title {
            font-size: 14px !important;
            font-weight: bold !important;
            color: #e2e8f0 !important;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.15);
            padding-bottom: 8px;
            margin-bottom: 2px;
        }

        /* 📌 터치/클릭한 개별 권역 정보 안내창 */
        .single-info-box {
            background: rgba(255, 255, 255, 0.08);
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .single-info-box .info-header {
            font-weight: bold;
            color: #63b3ed;
            margin-bottom: 2px;
        }
        
        /* 세로 정렬 라인 스타일 */
        .info-v-row {
            display: flex;
            justify-content: space-between;
            width: 100%;
        }
        .info-v-label {
            color: #cbd5e0;
        }
        .info-v-val {
            font-weight: bold;
        }
        
        /* 색상별 권역 안내 스타일 */
        .calc-result-vertical .legend-row {
            display: flex !important;
            flex-direction: column;
            gap: 5px;
            font-size: 10.5px !important; 
            color: #a0aec0 !important;    
            background: rgba(255, 255, 255, 0.04);
            padding: 8px 12px;
            border-radius: 6px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* 월별 합계 노출 열 스타일 */
        .calc-result-vertical .calc-row {
            display: flex !important;
            justify-content: space-between !important;
            font-size: 15px !important; 
            font-weight: bold !important;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 8px;
            margin-top: 2px;
        }
        .calc-result-vertical .calc-label {
            color: #cbd5e0 !important;
        }
        .calc-result-vertical .highlight-4 { color: #ff9f1c !important; font-size: 17px !important; }
        .calc-result-vertical .highlight-5 { color: #3182ce !important; font-size: 17px !important; }

        /* PC용 마우스 추적 툴팁 */
        .custom-tooltip {
            position: absolute;
            background: rgba(255, 255, 255, 0.96);
            color: #1c1c23;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(0, 0, 0, 0.08);
            white-space: nowrap;
            pointer-events: none;
            display: none;
            z-index: 999;
            transform: translate(15px, 15px);
        }
        .tooltip-row {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-top: 4px;
        }
        .tooltip-label { color: #666666; }
        .tooltip-value { font-weight: bold; color: #1c1c23; }
        .tooltip-divider {
            border-bottom: 1px dashed #cbd5e0; 
            margin: 6px 0;
        }

        @media (max-width: 480px) {
            .map-control-box { top: 10px; left: 10px; width: calc(100% - 20px); }
            .calc-result-vertical { padding: 12px 15px !important; gap: 8px; }
        }
    </style>
</head>
<body>

<div class="map-control-box">
    <div class="btn-row">
        <button id="btn-delivery" class="control-btn active" onclick="switchData('delivery')">👤 기사별 물량</button>
        <button id="btn-calc" class="control-btn" onclick="switchData('calc')">📍구역별 물량</button>
    </div>
    
    <div id="calc-result-box" class="calc-result-vertical">
        </div>
</div>

<div id="map"></div>
<div id="map-tooltip" class="custom-tooltip"></div>

<script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=5285fdc7da347f156b1adda9a9faab95&autoload=false"></script>

<script>
var map, bounds, tooltipEl, calcResultBoxEl;
var currentPolygons = []; 
var currentMode = 'delivery'; 
var selectedPolygons = new Set(); 
var isMobile = /Mobi|Android|iPhone/i.test(navigator.userAgent);

kakao.maps.load(function() {
    var mapContainer = document.getElementById('map'), 
        mapOption = { 
            center: new kakao.maps.LatLng(37.5665, 126.9780), 
            level: 8
        }; 
    
    map = new kakao.maps.Map(mapContainer, mapOption);
    tooltipEl = document.getElementById('map-tooltip');
    calcResultBoxEl = document.getElementById('calc-result-box');

    switchData('delivery');
});

function switchData(type) {
    currentMode = type;
    
    document.getElementById('btn-delivery').classList.remove('active');
    document.getElementById('btn-calc').classList.remove('active');
    
    tooltipEl.style.display = 'none';
    selectedPolygons.clear(); 

    if (type === 'delivery') {
        document.getElementById('btn-delivery').classList.add('active');
        
        calcResultBoxEl.innerHTML = `
            <div class="calc-title">기사별 권역, 물량 현황</div>
            <div id="single-info" class="single-info-box">
                <div class="info-header">지도 내 권역을 터치(클릭)하세요.</div>
            </div>
        `;
        calcResultBoxEl.style.display = 'flex';
        loadMapData('delivery.json', '👤 담당 기사');
    } else if (type === 'calc') {
        document.getElementById('btn-calc').classList.add('active');
        
        // 💡 [위치 최종 수정] 범례(legend-row)가 무조건 위로 오도록 상단 배치
        calcResultBoxEl.innerHTML = `
            <div class="calc-title">선택 구역 물량 합계</div>
            <div class="legend-row">
                <div class="legend-item">🔵 파랑색 : 아파트</div>
                <div class="legend-item">🟡 노랑색 : 지번</div>
                <div class="legend-item">🟢 초록색 : 오피스텔</div>
                <div class="legend-item" style="font-size:9.5px; line-height:1.3; margin-top:3px; color:#a0aec0;">
                    * 도로명 주소 집계 기준으로, 주소 오기재, 지번주소만 입력된 건 등은 누락될 수 있습니다.
                </div>
            </div>
            <div id="single-info" class="single-info-box" style="display:none;">
                </div>
            <div class="calc-row">
                <span class="calc-label">4월 물량 :</span>
                <span id="calc-vol4-val" class="highlight-4">0 건</span>
            </div>
            <div class="calc-row">
                <span class="calc-label">5월 물량 :</span>
                <span id="calc-vol5-val" class="highlight-5">0 건</span>
            </div>
        `;
        calcResultBoxEl.style.display = 'flex';
        loadMapData('all.json', '📍 선택 권역');
    }
}

function isPureNumber(val) {
    if (val === undefined || val === null) return true;
    if (typeof val === 'number') return true;
    var str = String(val).replace(/,/g, '').trim();
    if (str === '') return true;
    return !isNaN(Number(str));
}

function parseVolume(val) {
    if (val === undefined || val === null) return 0;
    var str = String(val).replace(/,/g, '').trim();
    var num = Number(str);
    return isNaN(num) ? 0 : num;
}

function formatRawValue(val) {
    if (val === undefined || val === null) return '0';
    return String(val).trim();
}

function updateCalcResultDisplay() {
    if (currentMode !== 'calc') return;
    
    var totalVol4 = 0;
    var totalVol5 = 0;
    var hasStr4 = false;
    var hasStr5 = false;
    var str4Val = '';
    var str5Val = '';

    selectedPolygons.forEach(p => {
        if (!isPureNumber(p.customInfo.rawVol4)) {
            hasStr4 = true;
            str4Val = p.customInfo.displayStr4;
        }
        if (!isPureNumber(p.customInfo.rawVol5)) {
            hasStr5 = true;
            str5Val = p.customInfo.displayStr5;
        }
        totalVol4 += p.customInfo.zoneVolume4;
        totalVol5 += p.customInfo.zoneVolume5;
    });

    document.getElementById('calc-vol4-val').innerText = hasStr4 ? str4Val : totalVol4.toLocaleString() + " 건";
    document.getElementById('calc-vol5-val').innerText = hasStr5 ? str5Val : totalVol5.toLocaleString() + " 건";
}

function loadMapData(jsonFileName, labelName) {
    currentPolygons.forEach(polygon => polygon.setMap(null));
    currentPolygons = []; 
    bounds = new kakao.maps.LatLngBounds();

    fetch(jsonFileName)
        .then(response => {
            if (!response.ok) throw new Error('HTTP error! status: ' + response.status);
            return response.json();
        })
        .then(geojson => {
            var managerMaster = {};
            var allPolygons = []; 

            geojson.features.forEach((feature) => {
                var properties = feature.properties;
                var name = properties.manager || properties.name || '미지정';
                
                var raw4 = properties.volume_4 || properties.volume4 || properties.volume || 0;
                var raw5 = properties.volume_5 || properties.volume5 || properties.volume || 0;

                if (!managerMaster[name]) {
                    managerMaster[name] = {
                        totalVolume4: 0,
                        totalVolume5: 0,
                        isStringMode4: false,
                        isStringMode5: false,
                        fallbackStr4: '',
                        fallbackStr5: '',
                        polygons: []
                    };
                }

                if (!isPureNumber(raw4)) {
                    managerMaster[name].isStringMode4 = true;
                    managerMaster[name].fallbackStr4 = String(raw4).trim();
                } else {
                    managerMaster[name].totalVolume4 += parseVolume(raw4);
                }

                if (!isPureNumber(raw5)) {
                    managerMaster[name].isStringMode5 = true;
                    managerMaster[name].fallbackStr5 = String(raw5).trim();
                } else {
                    managerMaster[name].totalVolume5 += parseVolume(raw5);
                }
            });

            geojson.features.forEach((feature) => {
                if (!feature.geometry || !feature.geometry.coordinates || feature.geometry.type !== 'Polygon') return;

                var coordinates = feature.geometry.coordinates[0];
                var path = [];
                
                coordinates.forEach(coord => {
                    var latLng = new kakao.maps.LatLng(coord[1], coord[0]);
                    path.push(latLng);
                    bounds.extend(latLng);
                });

                var properties = feature.properties;
                var name = properties.manager || properties.name || '미지정';
                var zoneType = properties.type || '일반';

                var raw4 = properties.volume_4 || properties.volume4 || properties.volume || 0;
                var raw5 = properties.volume_5 || properties.volume5 || properties.volume || 0;

                var baseColor = '#3b82f6'; 

                if (currentMode === 'calc') {
                    if (zoneType === '아파트') baseColor = '#5370d9';       
                    else if (zoneType === '지번') baseColor = '#f79f1b';     
                    else if (zoneType === '오피스텔') baseColor = '#8fe269'; 
                    else baseColor = '#475569';                                         
                } else {
                    baseColor = '#3b82f6'; 
                }

                var polygon = new kakao.maps.Polygon({
                    path: path,
                    strokeWeight: 2,
                    strokeColor: baseColor,
                    strokeOpacity: 0.8,
                    fillColor: baseColor,
                    fillOpacity: 0.3
                });

                polygon.setMap(map);

                polygon.customInfo = {
                    manager: name,
                    type: zoneType,
                    rawVol4: raw4,
                    rawVol5: raw5,
                    zoneVolume4: parseVolume(raw4),
                    zoneVolume5: parseVolume(raw5),
                    displayStr4: formatRawValue(raw4),
                    displayStr5: formatRawValue(raw5),
                    baseColor: baseColor, 
                    isSelected: false 
                };

                managerMaster[name].polygons.push(polygon);
                allPolygons.push(polygon);
                currentPolygons.push(polygon);
            });

            allPolygons.forEach(polygon => {
                var targetManager = polygon.customInfo.manager;
                var masterData = managerMaster[targetManager];
                var siblingPolygons = masterData.polygons; 
                var baseColor = polygon.customInfo.baseColor;

                // 1. 마우스 오버 (PC)
                kakao.maps.event.addListener(polygon, 'mouseover', function() {
                    if (isMobile) return;
                    
                    if (currentMode === 'delivery') {
                        siblingPolygons.forEach(p => {
                            if (!p.customInfo.isSelected) {
                                p.setOptions({ strokeWeight: 4, strokeColor: '#ffffff', fillColor: '#ef4444', fillOpacity: 0.6 });
                            }
                        });
                        
                        var finalDisplay4 = masterData.isStringMode4 ? masterData.fallbackStr4 : masterData.totalVolume4.toLocaleString() + " 건";
                        var finalDisplay5 = masterData.isStringMode5 ? masterData.fallbackStr5 : masterData.totalVolume5.toLocaleString() + " 건";

                        tooltipEl.innerHTML = `
                            <div class="tooltip-row"><span class="tooltip-label">👤 담당 기사</span><span class="tooltip-value">${targetManager}</span></div>
                            <div class="tooltip-divider"></div>
                            <div class="tooltip-row"><span class="tooltip-label">4월 총합</span><span class="tooltip-value" style="color: #ff9f1c;">${finalDisplay4}</span></div>
                            <div class="tooltip-row"><span class="tooltip-label">5월 총합</span><span class="tooltip-value" style="color: #3182ce;">${finalDisplay5}</span></div>
                        `;
                    } else {
                        if (!polygon.customInfo.isSelected) {
                            polygon.setOptions({ strokeWeight: 3, strokeColor: '#ffffff' });
                        }
                        tooltipEl.innerHTML = `
                            <div class="tooltip-row"><span class="tooltip-label">구분 / 담당</span><span class="tooltip-value">${polygon.customInfo.type} (${targetManager})</span></div>
                            <div class="tooltip-divider"></div>
                            <div class="tooltip-row"><span class="tooltip-label">4월 물량</span><span class="tooltip-value" style="color: #ff9f1c;">${polygon.customInfo.displayStr4} 건</span></div>
                            <div class="tooltip-row"><span class="tooltip-label">5월 물량</span><span class="tooltip-value" style="color: #3182ce;">${polygon.customInfo.displayStr5} 건</span></div>
                        `;
                    }
                    tooltipEl.style.display = 'block';
                });

                // 2. 마우스 무브
                kakao.maps.event.addListener(polygon, 'mousemove', function(mouseEvent) {
                    if (isMobile) return;
                    tooltipEl.style.left = (mouseEvent.point.x) + 'px';
                    tooltipEl.style.top = (mouseEvent.point.y) + 'px';
                });

                // 3. 마우스 아웃
                kakao.maps.event.addListener(polygon, 'mouseout', function() {
                    if (isMobile) return;
                    if (currentMode === 'delivery') {
                        siblingPolygons.forEach(p => {
                            if (!p.customInfo.isSelected) {
                                p.setOptions({ strokeWeight: 2, strokeColor: p.customInfo.baseColor, fillColor: p.customInfo.baseColor, fillOpacity: 0.3 });
                            }
                        });
                    } else {
                        if (!polygon.customInfo.isSelected) {
                            polygon.setOptions({ strokeWeight: 2, strokeColor: baseColor, fillColor: baseColor, fillOpacity: 0.35 });
                        }
                    }
                    tooltipEl.style.display = 'none';
                });

                // 4. 마우스 클릭 / 모바일 터치
                kakao.maps.event.addListener(polygon, 'click', function() {
                    var singleInfoEl = document.getElementById('single-info');

                    if (currentMode === 'delivery') {
                        var isAlreadySelected = polygon.customInfo.isSelected;
                        
                        if (!isAlreadySelected) {
                            allPolygons.forEach(p => {
                                if (p.customInfo.isSelected) {
                                    p.customInfo.isSelected = false;
                                    p.setOptions({ strokeWeight: 2, strokeColor: p.customInfo.baseColor, fillColor: p.customInfo.baseColor, fillOpacity: 0.3 });
                                }
                            });
                        }

                        var nextState = !isAlreadySelected;
                        siblingPolygons.forEach(p => {
                            p.customInfo.isSelected = nextState;
                            if (nextState) {
                                p.setOptions({ strokeWeight: 4, strokeColor: '#ffffff', fillColor: '#ef4444', fillOpacity: 0.6 });
                            } else {
                                p.setOptions({ strokeWeight: 2, strokeColor: p.customInfo.baseColor, fillColor: p.customInfo.baseColor, fillOpacity: 0.3 });
                            }
                        });

                        if (nextState) {
                            var finalDisplay4 = masterData.isStringMode4 ? masterData.fallbackStr4 : masterData.totalVolume4.toLocaleString() + " 건";
                            var finalDisplay5 = masterData.isStringMode5 ? masterData.fallbackStr5 : masterData.totalVolume5.toLocaleString() + " 건";
                            
                            singleInfoEl.innerHTML = `
                                <div class="info-header"> 담당 기사 : ${targetManager}</div>
                                <div style="margin-top:2px;">4월 물량: <span style="font-weight:bold; color:#ff9f1c;">${finalDisplay4}</span></div>
                                <div>5월 물량: <span style="font-weight:bold; color:#63b3ed;">${finalDisplay5}</span></div>
                            `;
                        } else {
                            singleInfoEl.innerHTML = `
                                <div class="info-header">지도 내 권역을 터치(클릭)하세요.</div>
                            `;
                        }

                    } else if (currentMode === 'calc') {
                        if (!polygon.customInfo.isSelected) {
                            polygon.customInfo.isSelected = true;
                            selectedPolygons.add(polygon);
                            polygon.setOptions({ strokeWeight: 4, strokeColor: '#ffffff', fillColor: '#ef4444', fillOpacity: 0.6 });
                        } else {
                            polygon.customInfo.isSelected = false;
                            selectedPolygons.delete(polygon);
                            polygon.setOptions({ strokeWeight: 2, strokeColor: baseColor, fillColor: baseColor, fillOpacity: 0.35 });
                        }
                        
                        if (polygon.customInfo.isSelected) {
                            singleInfoEl.style.display = 'flex';
                            singleInfoEl.innerHTML = `
                                <div class="info-header">📍 선택한 권역 (${polygon.customInfo.type})</div>
                                <div class="info-v-row">
                                    <span class="info-v-label">4월 :</span>
                                    <span class="info-v-val" style="color:#ff9f1c;">${polygon.customInfo.displayStr4} 건</span>
                                </div>
                                <div class="info-v-row">
                                    <span class="info-v-label">5월 :</span>
                                    <span class="info-v-val" style="color:#63b3ed;">${polygon.customInfo.displayStr5} 건</span>
                                </div>
                            `;
                        } else {
                            if(selectedPolygons.size === 0) {
                                singleInfoEl.style.display = 'none';
                            }
                        }

                        updateCalcResultDisplay();
                    }
                });
            });

            if (allPolygons.length > 0) {
                map.setBounds(bounds);
            }
        })
        .catch(error => {
            console.error(jsonFileName + ' 데이터 로드 실패:', error);
        });
}
</script>
</body>
</html>
