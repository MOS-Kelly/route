<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>기사님별 담당 권역 관리 지도</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; }
        #map { width: 100%; height: 100%; }
        .infowindow-padding { padding: 10px; font-size: 14px; line-height: 1.6; }
    </style>
</head>
<body>

<div id="map"></div>

<script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=5285fdc7da347f156b1adda9a9faab95&autoload=false"></script>

<script>
// 2. 브라우저가 위의 카카오 스크립트 베이스를 다 읽은 직후, 안전하게 load 함수를 호출합니다.
kakao.maps.load(function() {
    var mapContainer = document.getElementById('map'), 
        mapOption = { 
            center: new kakao.maps.LatLng(37.5665, 126.9780), // 기본 서울 중심
            level: 8 
        }; 
    
    var map = new kakao.maps.Map(mapContainer, mapOption);
    var infowindow = new kakao.maps.InfoWindow({ removable: true });
    var bounds = new kakao.maps.LatLngBounds();

    // 3. 깃허브 및 로컬 환경에서 delivery_zones.json 데이터를 호출합니다.
    fetch('delivery_zones.json')
        .then(response => {
            if (!response.ok) {
                throw new Error('HTTP error! status: ' + response.status);
            }
            return response.json();
        })
        .then(geojson => {
            geojson.features.forEach(feature => {
                var coordinates = feature.geometry.coordinates[0];
                var path = [];
                
                coordinates.forEach(coord => {
                    var latLng = new kakao.maps.LatLng(coord[1], coord[0]);
                    path.push(latLng);
                    bounds.extend(latLng); // 기사님들 실제 좌표 위치 수집
                });

                var properties = feature.properties;

                var polygon = new kakao.maps.Polygon({
                    path: path,
                    strokeWeight: 2,
                    strokeColor: '#004c80',
                    strokeOpacity: 0.8,
                    fillColor: '#1a75ff',
                    fillOpacity: 0.3
                });

                polygon.setMap(map);

                kakao.maps.event.addListener(polygon, 'click', function(mouseEvent) {
                    var content = `
                        <div class="infowindow-padding">
                            <strong>📍 권역: ${properties.region_name || '미지정 권역'}</strong><br>
                            👤 담당자: ${properties.manager || '담당자 없음'}<br>
                            📦 당일 물량: ${properties.volume || '0'}
                        </div>
                    `;
                    infowindow.setContent(content);
                    infowindow.setPosition(mouseEvent.latLng);
                    infowindow.open(map);
                });
            });

            // 모든 좌표 데이터 분석 후 실제 권역 위치로 지도 화면 자동 이동
            map.setBounds(bounds);
        })
        .catch(error => {
            console.error('데이터 파싱 또는 로드 실패:', error);
        });
});
</script>
</body>
</html>
