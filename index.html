<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>담당 권역 관리 및 월별 물량 비교 지도</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Malgun Gothic', dotum, sans-serif; }
        #map { width: 100%; height: 100%; z-index: 1; }
        
        /* 상단 제어 박스 (버튼과 세로 현황판을 하나로 묶음) */
        .map-control-box {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn-row {
            display: flex;
            gap: 8px;
            background: rgba(255, 255, 255, 0.94);
            padding: 8px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.12);
            border: 1px solid rgba(0, 0, 0, 0.06);
        }
        .control-btn {
            border: 1px solid #e2e8f0;
            background: #ffffff;
            color: #4a5568;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .control-btn:hover {
            background: #f7fafc;
            border-color: #cbd5e0;
        }
        .control-btn.active {
            background: #0055d4;
            color: #ffffff;
            border-color: #0055d4;
            box-shadow: 0 2px 6px rgba(0, 85, 212, 0.3);
        }

        /* 👑 [창 크기 확실하게 확장] 세로형 총 합계 현황판 */
        .calc-result-vertical {
            background: rgba(28, 28, 35, 0.96) !important;
            color: #ffffff !important;
            padding: 16px 20px !important;
            border-radius: 12px !important;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3) !important;
            display: none; 
            flex-direction: column;
            gap: 8px;
            width: 260px !important; /* 창 크기를 260px로 확실히 키움 */
            letter-spacing: -0.5px;
            box-sizing: border-box;
        }
        .calc-result-vertical .calc-title {
            font-size: 14px !important;
            font-weight: bold !important;
            color: #e2e8f0 !important;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.15);
            padding-bottom: 8px;
            margin-bottom: 4px;
        }
        
        /* 🔍 [참고 문구 소형화 및 글씨 크기 다운] 색상별 권역 안내 스타일 */
        .calc-result-vertical .legend-row {
            display: flex !important;
            flex-direction: column;
            gap: 5px;
            font-size: 10.5px !important; /* 메인보다 확연히 작은 크기 */
            color: #a0aec0 !important;    /* 눈에 피로가 덜한 흐린 서브 톤 */
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 4px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .legend-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            display: inline-block;
        }

        /* 📈 [글씨 크게 키움] 월별 합계 노출 열 스타일 */
        .calc-result-vertical .calc-row {
            display: flex !important;
            justify-content: space-between !important;
            font-size: 16px !important; /* 16px로 굵고 크게 변경 */
            font-weight: bold !important;
            margin-top: 2px;
            align-items: center;
        }
        .calc-result-vertical .calc-label {
            color: #cbd5e0 !important;
        }
        .calc-result-vertical .highlight-4 { color: #ffffff !important; font-size: 18px !important; }
        .calc-result-vertical .highlight-5 { color: #ffffff !important; font-size: 18px !important; }

        /* 커서 위치를 따라다니는 순수 툴팁 CSS */
        .custom-tooltip {
            position: absolute;
            background: rgba(255, 255, 255, 0.96);
            color: #1c1c23;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(0, 0, 0, 0.08);
            white-space: nowrap;
            pointer-events: none;
            display: none;
            z-index: 999;
            transform: translate(15px, 15px);
        }
        .tooltip-row {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-top: 4px;
        }
        .tooltip-label { color: #666666; }
        .tooltip-value { font-weight: bold; color: #1c1c23; }
        .tooltip-divider {
            border-bottom: 1px dashed #cbd5e0; 
            margin: 6px 0;
        }
    </style>
</head>
<body>

<div class="map-control-box">
    <div class="btn-row">
        <button id="btn-delivery" class="control-btn active" onclick="switchData('delivery')">👤 기사별 물량</button>
        <button id="btn-calc" class="control-btn" onclick="switchData('calc')">🧮 권역 물량 계산</button>
    </div>
    
    <div id="calc-result-box" class="calc-result-vertical">
        <div class="calc-title">📍 선택 권역 물량 합계</div>
        
        <div class="legend-row">
            <div class="legend-item"> 🔵 파랑색 : 아파트</div>
            <div class="legend-item"> 🟡 노랑색 : 지번</div>
            <div class="legend-item"> 🟢 초록색 : 오피스텔</div>
            <div class="legend-item"> </div>
            <div class="legend-item"> 도로명 주소 기준으로 집계된 물량으로, 지번주소만 기재 또는 주소지 오기재건은 누락되어 실제 물량과는 차이 있습니다.</div>
        </div>

        <div class="calc-row">
            <span class="calc-label">4월 물량 기준 :</span>
            <span id="calc-vol4-val" class="highlight-4">0 건</span>
        </div>
        <div class="calc-row">
            <span class="calc-label">5월 물량 기준 :</span>
            <span id="calc-vol5-val" class="highlight-5">0 건</span>
        </div>
        
    </div>
</div>

<div id="map"></div>
<div id="map-tooltip" class="custom-tooltip"></div>

<script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=5285fdc7da347f156b1adda9a9faab95&autoload=false"></script>

<script>
var map, bounds, tooltipEl, calcResultBoxEl;
var currentPolygons = []; 
var currentMode = 'delivery'; 
var selectedPolygons = new Set(); 

kakao.maps.load(function() {
    var mapContainer = document.getElementById('map'), 
        mapOption = { 
            center: new kakao.maps.LatLng(37.5665, 126.9780), 
            level: 8 
        }; 
    
    map = new kakao.maps.Map(mapContainer, mapOption);
    tooltipEl = document.getElementById('map-tooltip');
    calcResultBoxEl = document.getElementById('calc-result-box');

    switchData('delivery');
});

function switchData(type) {
    currentMode = type;
    
    document.getElementById('btn-delivery').classList.remove('active');
    document.getElementById('btn-calc').classList.remove('active');
    
    tooltipEl.style.display = 'none';
    calcResultBoxEl.style.display = 'none';
    selectedPolygons.clear(); 

    if (type === 'delivery') {
        document.getElementById('btn-delivery').classList.add('active');
        loadMapData('delivery.json', '👤 담당 기사');
    } else if (type === 'calc') {
        document.getElementById('btn-calc').classList.add('active');
        document.getElementById('calc-vol4-val').innerText = "0 건";
        document.getElementById('calc-vol5-val').innerText = "0 건";
        calcResultBoxEl.style.display = 'flex';
        loadMapData('all.json', '📍 선택 권역');
    }
}

function isPureNumber(val) {
    if (val === undefined || val === null) return true;
    if (typeof val === 'number') return true;
    var str = String(val).replace(/,/g, '').trim();
    if (str === '') return true;
    return !isNaN(Number(str));
}

function parseVolume(val) {
    if (val === undefined || val === null) return 0;
    var str = String(val).replace(/,/g, '').trim();
    var num = Number(str);
    return isNaN(num) ? 0 : num;
}

function formatRawValue(val) {
    if (val === undefined || val === null) return '0';
    return String(val).trim();
}

function updateCalcResultDisplay() {
    var totalVol4 = 0;
    var totalVol5 = 0;
    var hasStr4 = false;
    var hasStr5 = false;
    var str4Val = '';
    var str5Val = '';

    selectedPolygons.forEach(p => {
        if (!isPureNumber(p.customInfo.rawVol4)) {
            hasStr4 = true;
            str4Val = p.customInfo.displayStr4;
        }
        if (!isPureNumber(p.customInfo.rawVol5)) {
            hasStr5 = true;
            str5Val = p.customInfo.displayStr5;
        }
        totalVol4 += p.customInfo.zoneVolume4;
        totalVol5 += p.customInfo.zoneVolume5;
    });

    document.getElementById('calc-vol4-val').innerText = hasStr4 ? str4Val : totalVol4.toLocaleString() + " 건";
    document.getElementById('calc-vol5-val').innerText = hasStr5 ? str5Val : totalVol5.toLocaleString() + " 건";
}

function loadMapData(jsonFileName, labelName) {
    currentPolygons.forEach(polygon => polygon.setMap(null));
    currentPolygons = []; 
    bounds = new kakao.maps.LatLngBounds();

    fetch(jsonFileName)
        .then(response => {
            if (!response.ok) throw new Error('HTTP error! status: ' + response.status);
            return response.json();
        })
        .then(geojson => {
            var managerMaster = {};
            var allPolygons = []; 

            geojson.features.forEach((feature) => {
                var properties = feature.properties;
                var name = properties.manager || properties.name || '미지정';
                
                var raw4 = properties.volume_4 || properties.volume4 || properties.volume || 0;
                var raw5 = properties.volume_5 || properties.volume5 || properties.volume || 0;

                if (!managerMaster[name]) {
                    managerMaster[name] = {
                        totalVolume4: 0,
                        totalVolume5: 0,
                        isStringMode4: false,
                        isStringMode5: false,
                        fallbackStr4: '',
                        fallbackStr5: '',
                        polygons: []
                    };
                }

                if (!isPureNumber(raw4)) {
                    managerMaster[name].isStringMode4 = true;
                    managerMaster[name].fallbackStr4 = String(raw4).trim();
                } else {
                    managerMaster[name].totalVolume4 += parseVolume(raw4);
                }

                if (!isPureNumber(raw5)) {
                    managerMaster[name].isStringMode5 = true;
                    managerMaster[name].fallbackStr5 = String(raw5).trim();
                } else {
                    managerMaster[name].totalVolume5 += parseVolume(raw5);
                }
            });

            geojson.features.forEach((feature) => {
                if (!feature.geometry || !feature.geometry.coordinates || feature.geometry.type !== 'Polygon') return;

                var coordinates = feature.geometry.coordinates[0];
                var path = [];
                
                coordinates.forEach(coord => {
                    var latLng = new kakao.maps.LatLng(coord[1], coord[0]);
                    path.push(latLng);
                    bounds.extend(latLng);
                });

                var properties = feature.properties;
                var name = properties.manager || properties.name || '미지정';

                var raw4 = properties.volume_4 || properties.volume4 || properties.volume || 0;
                var raw5 = properties.volume_5 || properties.volume5 || properties.volume || 0;

                var baseColor = '#3b82f6'; 

                if (currentMode === 'calc') {
                    var type = properties.type;
                    if (type === '아파트') baseColor = '#5370d9';       
                    else if (type === '지번') baseColor = '#f79f1b';     
                    else if (type === '오피스텔') baseColor = '#8fe269'; 
                    else baseColor = '#475569';                         
                } else {
                    baseColor = '#3b82f6'; 
                }

                var polygon = new kakao.maps.Polygon({
                    path: path,
                    strokeWeight: 2,
                    strokeColor: baseColor,
                    strokeOpacity: 0.8,
                    fillColor: baseColor,
                    fillOpacity: 0.3
                });

                polygon.setMap(map);

                polygon.customInfo = {
                    manager: name,
                    rawVol4: raw4,
                    rawVol5: raw5,
                    zoneVolume4: parseVolume(raw4),
                    zoneVolume5: parseVolume(raw5),
                    displayStr4: formatRawValue(raw4),
                    displayStr5: formatRawValue(raw5),
                    baseColor: baseColor, 
                    isSelected: false 
                };

                managerMaster[name].polygons.push(polygon);
                allPolygons.push(polygon);
                currentPolygons.push(polygon);
            });

            allPolygons.forEach(polygon => {
                var targetManager = polygon.customInfo.manager;
                var masterData = managerMaster[targetManager];
                var siblingPolygons = masterData.polygons; 
                var baseColor = polygon.customInfo.baseColor;

                // 1. 마우스 오버 (Mouseover)
                kakao.maps.event.addListener(polygon, 'mouseover', function() {
                    if (currentMode === 'delivery') {
                        siblingPolygons.forEach(p => {
                            if (!p.customInfo.isSelected) {
                                p.setOptions({ 
                                    strokeWeight: 4, 
                                    strokeColor: '#ffffff', 
                                    fillColor: '#ef4444', 
                                    fillOpacity: 0.6 
                                });
                            }
                        });
                        
                        var finalDisplay4 = masterData.isStringMode4 ? masterData.fallbackStr4 : masterData.totalVolume4.toLocaleString() + " 건";
                        var finalDisplay5 = masterData.isStringMode5 ? masterData.fallbackStr5 : masterData.totalVolume5.toLocaleString() + " 건";

                        tooltipEl.innerHTML = `
                            <div class="tooltip-row">
                                <span class="tooltip-label">👤 담당 기사</span>
                                <span class="tooltip-value" style="font-size: 14px;">${targetManager}</span>
                            </div>
                            <div class="tooltip-divider"></div>
                            <div class="tooltip-row">
                                <span class="tooltip-label">4월 물량</span>
                                <span class="tooltip-value" style="color: #ff9f1c;">${finalDisplay4}</span>
                            </div>
                            <div class="tooltip-row">
                                <span class="tooltip-label">5월 물량</span>
                                <span class="tooltip-value" style="color: #0055d4;">${finalDisplay5}</span>
                            </div>
                        `;
                    } else {
                        if (!polygon.customInfo.isSelected) {
                            polygon.setOptions({ strokeWeight: 3, strokeColor: '#ffffff' });
                        }
                        
                        tooltipEl.innerHTML = `
                            <div class="tooltip-row">
                                <span class="tooltip-label">4월 물량</span>
                                <span class="tooltip-value" style="color: #ff9f1c;">${polygon.customInfo.displayStr4}</span>
                            </div>
                            <div class="tooltip-row">
                                <span class="tooltip-label">5월 물량</span>
                                <span class="tooltip-value" style="color: #0055d4;">${polygon.customInfo.displayStr5}</span>
                            </div>
                        `;
                    }
                    tooltipEl.style.display = 'block';
                });

                // 2. 마우스 무브 (Mousemove)
                kakao.maps.event.addListener(polygon, 'mousemove', function(mouseEvent) {
                    tooltipEl.style.left = (mouseEvent.point.x) + 'px';
                    tooltipEl.style.top = (mouseEvent.point.y) + 'px';
                });

                // 3. 마우스 아웃 (Mouseout)
                kakao.maps.event.addListener(polygon, 'mouseout', function() {
                    if (currentMode === 'delivery') {
                        siblingPolygons.forEach(p => {
                            if (!p.customInfo.isSelected) {
                                p.setOptions({ 
                                    strokeWeight: 2, 
                                    strokeColor: p.customInfo.baseColor, 
                                    fillColor: p.customInfo.baseColor, 
                                    fillOpacity: 0.3 
                                });
                            }
                        });
                    } else {
                        if (!polygon.customInfo.isSelected) {
                            polygon.setOptions({
                                strokeWeight: 2,
                                strokeColor: baseColor,
                                fillColor: baseColor,
                                fillOpacity: 0.35
                            });
                        }
                    }
                    tooltipEl.style.display = 'none';
                });

                // 4. 마우스 클릭 (Click)
                kakao.maps.event.addListener(polygon, 'click', function() {
                    if (currentMode === 'delivery') {
                        var isAlreadySelected = polygon.customInfo.isSelected;
                        
                        if (!isAlreadySelected) {
                            allPolygons.forEach(p => {
                                if (p.customInfo.isSelected) {
                                    p.customInfo.isSelected = false;
                                    p.setOptions({
                                        strokeWeight: 2,
                                        strokeColor: p.customInfo.baseColor,
                                        fillColor: p.customInfo.baseColor,
                                        fillOpacity: 0.3
                                    });
                                }
                            });
                        }

                        var nextState = !isAlreadySelected;
                        siblingPolygons.forEach(p => {
                            p.customInfo.isSelected = nextState;
                            if (nextState) {
                                p.setOptions({
                                    strokeWeight: 4,
                                    strokeColor: '#ffffff',
                                    fillColor: '#ef4444',
                                    fillOpacity: 0.6
                                });
                            } else {
                                p.setOptions({
                                    strokeWeight: 2,
                                    strokeColor: p.customInfo.baseColor,
                                    fillColor: p.customInfo.baseColor,
                                    fillOpacity: 0.3
                                });
                            }
                        });
                    } else if (currentMode === 'calc') {
                        if (!polygon.customInfo.isSelected) {
                            polygon.customInfo.isSelected = true;
                            selectedPolygons.add(polygon);
                            
                            polygon.setOptions({
                                strokeWeight: 4,
                                strokeColor: '#ffffff',
                                fillColor: '#ef4444', 
                                fillOpacity: 0.6  
                            });
                        } else {
                            polygon.customInfo.isSelected = false;
                            selectedPolygons.delete(polygon);
                            
                            polygon.setOptions({
                                strokeWeight: 2,
                                strokeColor: baseColor,
                                fillColor: baseColor,
                                fillOpacity: 0.35
                            });
                        }
                        updateCalcResultDisplay();
                    }
                });
            });

            if (allPolygons.length > 0) {
                map.setBounds(bounds);
            }
        })
        .catch(error => {
            console.error(jsonFileName + ' 데이터 로드 실패:', error);
        });
}
</script>
</body>
</html>
